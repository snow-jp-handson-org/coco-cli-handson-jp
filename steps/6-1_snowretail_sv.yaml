name: SNOWRETAIL_SV
description: EC and retail sales data mart combined with customer reviews for a retail
  analytics platform. MART_SALES contains transaction-level sales data across EC and
  retail channels with product categories. CUSTOMER_REVIEWS contains product reviews
  with ratings. Both tables share PRODUCT_ID but neither has unique PRODUCT_ID, so
  no relationship should be defined between them.
tables:
  - name: MART_SALES
    base_table:
      database: SNOWRETAIL_DB
      schema: SNOWRETAIL_SCHEMA
      table: MART_SALES
    dimensions:
      - name: TRANSACTION_ID
        expr: TRANSACTION_ID
        data_type: VARCHAR
      - name: CHANNEL
        expr: CHANNEL
        data_type: VARCHAR
      - name: PRODUCT_ID
        expr: PRODUCT_ID
        data_type: VARCHAR
      - name: PRODUCT_NAME
        expr: PRODUCT_NAME
        data_type: VARCHAR
      - name: CATEGORY
        expr: CATEGORY
        data_type: VARCHAR
      - name: QUANTITY
        expr: QUANTITY
        data_type: NUMBER
      - name: UNIT_PRICE
        expr: UNIT_PRICE
        data_type: NUMBER
      - name: TOTAL_PRICE
        expr: TOTAL_PRICE
        data_type: NUMBER
    time_dimensions:
      - name: TRANSACTION_DATE
        expr: TRANSACTION_DATE
        data_type: DATE
  - name: CUSTOMER_REVIEWS
    base_table:
      database: SNOWRETAIL_DB
      schema: SNOWRETAIL_SCHEMA
      table: CUSTOMER_REVIEWS
    dimensions:
      - name: REVIEW_ID
        expr: REVIEW_ID
        data_type: VARCHAR
      - name: PRODUCT_ID
        expr: PRODUCT_ID
        data_type: VARCHAR
      - name: CUSTOMER_ID
        expr: CUSTOMER_ID
        data_type: VARCHAR
      - name: REVIEW_TEXT
        expr: REVIEW_TEXT
        data_type: VARCHAR
      - name: PURCHASE_CHANNEL
        expr: PURCHASE_CHANNEL
        data_type: VARCHAR
      - name: HELPFUL_VOTES
        expr: HELPFUL_VOTES
        data_type: NUMBER
    time_dimensions:
      - name: REVIEW_DATE
        expr: REVIEW_DATE
        data_type: TIMESTAMP_NTZ
    facts:
      - name: RATING
        expr: RATING
        data_type: NUMBER
